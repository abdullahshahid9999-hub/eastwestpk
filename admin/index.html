<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — East & West Travel Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --navy:#F4F5F7;--navy-mid:#FFFFFF;--navy-light:#FAFAFB;
      --gold:#B8923A;--gold-dim:rgba(184,146,58,0.10);--gold-b:rgba(184,146,58,0.35);
      --white:#fff;--text:#1C1E26;--dim:#6B7280;
      --border:rgba(0,0,0,0.10);--red:#DC2626;--green:#0D9488;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);overflow:hidden}
    h1,h2,h3{font-family:'Playfair Display',serif}
    em{color:var(--gold);font-style:italic}

    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);animation:float 12s ease-in-out infinite}
    .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(14,165,233,0.18),transparent 70%);top:-200px;left:-100px}
    .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(184,146,58,0.16),transparent 70%);bottom:-150px;right:-100px;animation-delay:5s}
    .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.035) 1px,transparent 1px);background-size:60px 60px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}

    .wrap{position:relative;z-index:1;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

    .card{
      background:rgba(255,255,255,0.85);
      border:1px solid var(--border);
      border-radius:24px;
      padding:44px 40px;
      width:100%;max-width:420px;
      backdrop-filter:blur(20px);
      box-shadow:0 8px 40px rgba(20,30,50,0.10),0 2px 8px rgba(20,30,50,0.06);
      animation:slideUp .5s ease both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;justify-content:center}
    .brand img{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);padding:2px;object-fit:contain;background:#fff;box-shadow:0 0 20px rgba(184,146,58,0.25)}
    .brand-text{font-size:20px;color:var(--text)}
    .brand-text span{color:var(--gold)}

    .card-title{font-size:26px;color:var(--text);text-align:center;margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--dim);text-align:center;margin-bottom:32px}
    .card-sub i{color:var(--gold);margin-right:5px}

    .fg{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
    label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
    .inp-wrap{position:relative}
    .inp-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
    input[type=text],input[type=email],input[type=password]{
      width:100%;background:rgba(0,0,0,0.035);
      border:1.5px solid var(--border);border-radius:12px;
      padding:13px 14px 13px 42px;
      font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;
      outline:none;transition:all .3s;
    }
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,146,58,0.15)}
    .toggle-pwd{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px;transition:color .2s}
    .toggle-pwd:hover{color:var(--gold)}

    .alert{border-radius:10px;padding:12px 14px;font-size:13px;display:none;margin-bottom:16px;align-items:center;gap:10px}
    .alert.show{display:flex}
    .alert-err{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);color:#B91C1C}
    .alert-ok{background:rgba(13,148,136,0.08);border:1px solid rgba(13,148,136,0.25);color:#0F766E}

    .login-btn{
      width:100%;background:linear-gradient(135deg,var(--gold),#9C7A2E);
      color:#fff;border:none;padding:14px;border-radius:12px;
      font-size:14px;font-weight:700;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:9px;
      transition:all .3s;margin-top:4px;
    }
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(184,146,58,0.4)}
    .login-btn:active{transform:translateY(0)}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    .forgot-link{text-align:right;margin-top:-10px;margin-bottom:18px}
    .forgot-link a{font-size:12px;color:rgba(160,120,40,0.95);cursor:pointer;transition:color .2s;text-decoration:none}
    .forgot-link a:hover{color:var(--gold)}

    .back-link{text-align:center;margin-top:20px;font-size:12.5px;color:var(--dim)}
    .back-link a{color:rgba(160,120,40,0.95);transition:color .2s}
    .back-link a:hover{color:var(--gold)}

    .screen{display:none}
    .screen.active{display:block}

    @media(max-width:480px){.card{padding:32px 24px}}
  </style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-bg"></div>
</div>

<div class="wrap">
  <div class="card">

    <div class="brand">
      <img src="../assets/images/logo.jpg" alt="East &amp; West" onerror="this.style.display='none'">
      <span class="brand-text">East &amp; <span>West</span> Travels</span>
    </div>

    <!-- ── LOGIN SCREEN ── -->
    <div class="screen active" id="screenLogin">
      <h2 class="card-title">Admin <em>Login</em></h2>
      <p class="card-sub"><i class="fa fa-shield-alt"></i> Restricted — Authorized Personnel Only</p>

      <div class="alert alert-err" id="loginErr">
        <i class="fa fa-exclamation-circle"></i>
        <span id="loginErrTxt"></span>
      </div>

      <div class="fg">
        <label>Email</label>
        <div class="inp-wrap">
          <i class="fa fa-envelope inp-ico"></i>
          <input type="email" id="adminEmail" placeholder="admin@eastwestpk.com" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <div class="fg">
        <label>Password</label>
        <div class="inp-wrap">
          <i class="fa fa-lock inp-ico"></i>
          <input type="password" id="adminPwd" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          <button class="toggle-pwd" onclick="togglePwd()" type="button"><i class="fa fa-eye" id="eyeIco"></i></button>
        </div>
      </div>

      <div class="forgot-link">
        <a onclick="showScreen('screenForgot')"><i class="fa fa-key" style="font-size:10px"></i> Forgot Password?</a>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <i class="fa fa-sign-in-alt"></i>
        <span id="loginTxt">Login to Admin Panel</span>
      </button>

      <div class="back-link">
        <a href="/"><i class="fa fa-arrow-left" style="font-size:10px"></i> Back to Website</a>
      </div>
    </div>

    <!-- ── FORGOT PASSWORD SCREEN ── -->
    <div class="screen" id="screenForgot">
      <h2 class="card-title">Reset <em>Password</em></h2>
      <p class="card-sub"><i class="fa fa-envelope"></i> Enter your email — we'll send a reset link</p>

      <div class="alert alert-err" id="forgotErr">
        <i class="fa fa-exclamation-circle"></i>
        <span id="forgotErrTxt"></span>
      </div>
      <div class="alert alert-ok" id="forgotOk">
        <i class="fa fa-check-circle"></i>
        <span id="forgotOkTxt"></span>
      </div>

      <div class="fg">
        <label>Email</label>
        <div class="inp-wrap">
          <i class="fa fa-envelope inp-ico"></i>
          <input type="email" id="resetEmail" placeholder="admin@eastwestpk.com" autocomplete="email" onkeydown="if(event.key==='Enter')doForgot()">
        </div>
      </div>

      <button class="login-btn" id="forgotBtn" onclick="doForgot()">
        <i class="fa fa-paper-plane"></i>
        <span id="forgotTxt">Send Reset Link</span>
      </button>

      <div class="back-link" style="margin-top:16px">
        <a onclick="showScreen('screenLogin')" style="cursor:pointer"><i class="fa fa-arrow-left" style="font-size:10px"></i> Back to Login</a>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPA_URL  = 'https://bciqlmvheqlsmogpnmal.supabase.co';
  const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjaXFsbXZoZXFsc21vZ3BubWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjY2NjYsImV4cCI6MjA4ODkwMjY2Nn0.NpwnG7NSx4YCcm--fT3-tcP_fSyoaXVgSxzHLRP9P3o';

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    hideAlerts();
  }

  function hideAlerts() {
    ['loginErr','forgotErr','forgotOk'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('show');
    });
  }

  function showErr(boxId, txtId, msg) {
    document.getElementById(txtId).textContent = msg;
    document.getElementById(boxId).classList.add('show');
  }

  function showOk(boxId, txtId, msg) {
    document.getElementById(txtId).textContent = msg;
    document.getElementById(boxId).classList.add('show');
  }

  function togglePwd() {
    const inp = document.getElementById('adminPwd');
    const ico = document.getElementById('eyeIco');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fa fa-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'fa fa-eye'; }
  }

  async function doLogin() {
    hideAlerts();
    const email = document.getElementById('adminEmail').value.trim();
    const pwd   = document.getElementById('adminPwd').value;
    if (!email || !pwd) { showErr('loginErr','loginErrTxt','Please enter email and password.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    document.getElementById('loginTxt').textContent = 'Verifying…';

    try {
      const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_ANON
        },
        body: JSON.stringify({ email, password: pwd })
      });
      const data = await res.json();

      if (!res.ok || !data.access_token) {
        throw new Error(data.error_description || data.msg || 'Invalid email or password.');
      }

      // Confirm this account is actually on the admin allow-list before
      // letting them in — a valid Supabase login alone is not enough,
      // since agents log in through the exact same auth system.
      document.getElementById('loginTxt').textContent = 'Checking access…';
      const checkRes = await fetch('/api/verify-admin', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${data.access_token}` }
      });
      const checkData = await checkRes.json();
      if (!checkData.isAdmin) {
        // Not an admin — sign this session out immediately, don't leave
        // a dangling authenticated session sitting in the browser.
        await fetch(`${SUPA_URL}/auth/v1/logout`, {
          method: 'POST',
          headers: { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${data.access_token}` }
        }).catch(()=>{});
        throw new Error('This account does not have admin access.');
      }

      // Save session
      sessionStorage.setItem('ew_admin', JSON.stringify({
        email: data.user.email,
        name: data.user.user_metadata?.name || 'Admin',
        role: 'admin',
        token: data.access_token
      }));

      window.location.href = '/admin/dashboard';

    } catch (err) {
      btn.disabled = false;
      document.getElementById('loginTxt').textContent = 'Login to Admin Panel';
      showErr('loginErr','loginErrTxt', err.message || 'Login failed. Try again.');
    }
  }

  async function doForgot() {
    hideAlerts();
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showErr('forgotErr','forgotErrTxt','Please enter your email.'); return; }

    const btn = document.getElementById('forgotBtn');
    btn.disabled = true;
    document.getElementById('forgotTxt').textContent = 'Sending…';

    try {
      const res = await fetch(`${SUPA_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_ANON
        },
        body: JSON.stringify({
          email,
          gotrue_meta_security: {}
        })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error_description || data.msg || 'Could not send reset email.');
      }

      showOk('forgotOk','forgotOkTxt', `Reset link sent to ${email}. Check your inbox.`);
      document.getElementById('resetEmail').value = '';

    } catch (err) {
      showErr('forgotErr','forgotErrTxt', err.message || 'Failed to send reset link.');
    } finally {
      btn.disabled = false;
      document.getElementById('forgotTxt').textContent = 'Send Reset Link';
    }
  }
</script>

</body>
</html>
