<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — East & West Travel Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --navy:#0A1628;--navy-mid:#0F2040;--navy-light:#162847;
      --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.12);--gold-b:rgba(201,168,76,0.3);
      --teal:#0EA5E9;--teal-glow:rgba(14,165,233,0.12);
      --white:#fff;--text:#E8EDF2;--dim:#8899AA;
      --border:rgba(255,255,255,0.08);--red:#EF4444;--green:#10B981;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);overflow:hidden}
    h1,h2,h3{font-family:'Playfair Display',serif}
    em{color:var(--gold);font-style:italic}

    /* BG */
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);animation:float 12s ease-in-out infinite}
    .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(14,165,233,0.13),transparent 70%);top:-200px;left:-100px}
    .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.1),transparent 70%);bottom:-150px;right:-100px;animation-delay:5s}
    .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:60px 60px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}

    /* LAYOUT */
    .wrap{position:relative;z-index:1;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

    /* CARD */
    .card{
      background:rgba(15,32,64,0.85);
      border:1px solid var(--border);
      border-radius:24px;
      padding:44px 40px;
      width:100%;max-width:420px;
      backdrop-filter:blur(20px);
      animation:slideUp .5s ease both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* BRAND */
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;justify-content:center}
    .brand img{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);padding:2px;object-fit:contain;background:#fff;box-shadow:0 0 20px rgba(201,168,76,0.3)}
    .brand-text{font-size:20px;color:var(--white)}
    .brand-text span{color:var(--gold)}

    .card-title{font-size:26px;color:var(--white);text-align:center;margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--dim);text-align:center;margin-bottom:32px}
    .card-sub i{color:var(--gold);margin-right:5px}

    /* FORM */
    .fg{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
    label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
    .inp-wrap{position:relative}
    .inp-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
    input[type=text],input[type=password]{
      width:100%;background:rgba(255,255,255,0.05);
      border:1.5px solid var(--border);border-radius:12px;
      padding:13px 14px 13px 42px;
      font-size:14px;color:var(--white);font-family:'DM Sans',sans-serif;
      outline:none;transition:all .3s;
    }
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
    .toggle-pwd{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px;transition:color .2s}
    .toggle-pwd:hover{color:var(--gold)}

    /* ERROR */
    .err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#FCA5A5;display:none;margin-bottom:16px;align-items:center;gap:10px}
    .err.show{display:flex}

    /* BTN */
    .login-btn{
      width:100%;background:linear-gradient(135deg,var(--gold),#b8952e);
      color:#fff;border:none;padding:14px;border-radius:12px;
      font-size:14px;font-weight:700;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:9px;
      transition:all .3s;margin-top:4px;
    }
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.35)}
    .login-btn:active{transform:translateY(0)}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    .back-link{text-align:center;margin-top:20px;font-size:12.5px;color:var(--dim)}
    .back-link a{color:rgba(201,168,76,0.7);transition:color .2s}
    .back-link a:hover{color:var(--gold)}

    @media(max-width:480px){.card{padding:32px 24px}}
  </style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-bg"></div>
</div>

<div class="wrap">
  <div class="card">

    <div class="brand">
      <img src="../assets/images/logo.jpg" alt="East &amp; West" onerror="this.style.display='none'">
      <span class="brand-text">East &amp; <span>West</span> Travels</span>
    </div>

    <h2 class="card-title">Admin <em>Login</em></h2>
    <p class="card-sub"><i class="fa fa-shield-alt"></i> Restricted — Authorized Personnel Only</p>

    <div class="err" id="errBox">
      <i class="fa fa-exclamation-circle"></i>
      <span id="errTxt"></span>
    </div>

    <div class="fg">
      <label>Username</label>
      <div class="inp-wrap">
        <i class="fa fa-user inp-ico"></i>
        <input type="text" id="adminUser" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')doAdminLogin()">
      </div>
    </div>

    <div class="fg">
      <label>Password</label>
      <div class="inp-wrap">
        <i class="fa fa-lock inp-ico"></i>
        <input type="password" id="adminPwd" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
        <button class="toggle-pwd" onclick="togglePwd()" type="button"><i class="fa fa-eye" id="eyeIco"></i></button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doAdminLogin()">
      <i class="fa fa-sign-in-alt" id="loginIco"></i>
      <span id="loginTxt">Login to Admin Panel</span>
    </button>

    <div class="back-link">
      <a href="../index.html"><i class="fa fa-arrow-left" style="font-size:10px"></i> Back to Website</a>
    </div>
  </div>
</div>

<script>
  // ── CREDENTIALS (change here anytime) ──
  const ADMIN_USER = 'ewadmin';
  const ADMIN_PASS = 'EW#Travel$786';

  function togglePwd() {
    const inp = document.getElementById('adminPwd');
    const ico = document.getElementById('eyeIco');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fa fa-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'fa fa-eye'; }
  }

  function showErr(msg) {
    document.getElementById('errTxt').textContent = msg;
    document.getElementById('errBox').classList.add('show');
  }

  function doAdminLogin() {
    const user = document.getElementById('adminUser').value.trim();
    const pwd  = document.getElementById('adminPwd').value;
    document.getElementById('errBox').classList.remove('show');

    if (!user || !pwd) { showErr('Please enter username and password.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    document.getElementById('loginTxt').textContent = 'Verifying…';

    setTimeout(() => {
      if (user === ADMIN_USER && pwd === ADMIN_PASS) {
        sessionStorage.setItem('ew_admin', JSON.stringify({ email: 'admin@eastwestpk.com', name: 'Admin', role: 'admin' }));
        window.location.href = 'dashboard.html';
      } else {
        btn.disabled = false;
        document.getElementById('loginTxt').textContent = 'Login to Admin Panel';
        showErr('Incorrect username or password.');
      }
    }, 600);
  }
</script>

</body>
</html>
